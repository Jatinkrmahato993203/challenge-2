name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality & Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: ESLint
        run: npx eslint src/ --max-warnings 0
        continue-on-error: true  # Start as warning, remove once codebase is clean

      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

      - name: Find unused dependencies (Knip)
        run: npx knip
        continue-on-error: true  # Informational — review output manually

      - name: Unit Tests (Vitest)
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: "placeholder-for-ci"
          VITE_GOOGLE_MAPS_KEY: "placeholder-for-ci"
          VITE_GA_ID: ""

      - name: Lighthouse CI
        run: npm run lighthouse
        continue-on-error: true # Warning only

      - name: Check bundle size
        run: |
          echo "📦 Bundle size report:"
          du -sh dist/
          echo ""
          echo "📊 Largest files:"
          find dist/assets -name "*.js" -exec du -sh {} \; | sort -rh | head -10

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          VITE_GEMINI_API_KEY: "placeholder-for-ci"
          VITE_GOOGLE_MAPS_KEY: "placeholder-for-ci"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
